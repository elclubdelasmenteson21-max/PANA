name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch libraries for Gradle compatibility
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f"
              sed -i 's/testCompile /testImplementation /g' "$f"
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f"
            fi
          done

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "====== GRADLE EXIT CODE: ${PIPESTATUS[0]} ======"
          echo "====== FULL BUILD LOG ======"
          cat build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build.log

      - name: Find APK
        if: always()
        run: |
          echo "=== APK find ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Build output ==="
          find android/app/build -name "*.apk" -o -name "*.aab" 2>/dev/null
          find android/app/.cxx -type f 2>/dev/null | head -5 || true
          find . -name "*.dex" -type f 2>/dev/null | head -5 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK
          path: android/app/build/outputs/apk/debug/*.apk
