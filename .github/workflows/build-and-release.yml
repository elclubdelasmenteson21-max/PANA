name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      build_type:
        description: 'Build type'
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm ci
          npx patch-package

      - name: Fix deprecated Gradle configs in legacy libraries
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f" 2>/dev/null || true
              sed -i 's/testCompile /testImplementation /g' "$f" 2>/dev/null || true
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f" 2>/dev/null || true
            fi
          done

      - name: Build APK
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} --no-daemon 2>&1 | tee build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          exit ${PIPESTATUS[0]}

      - name: Find APK
        if: success()
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "APK found: $APK"
          ls -la "$APK"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK-${{ github.event.inputs.build_type || 'debug' }}
          path: android/app/build/outputs/apk/**/*.apk

      - name: Create GitHub Release
        if: success() && (github.event.inputs.release == 'true' || startsWith(github.ref, 'refs/tags/'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="${{ steps.find_apk.outputs.APK_PATH }}"
          if [ -z "$APK" ]; then exit 1; fi
          TAG="v$(date +%Y%m%d)-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "PANA Build ${{ github.run_number }}" \
            --notes "Automated build from commit ${{ github.sha }}" \
            "$APK#PANA-${{ github.event.inputs.build_type || 'debug' }}.apk"
