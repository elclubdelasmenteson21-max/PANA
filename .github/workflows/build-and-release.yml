name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch libraries for Gradle compatibility
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f"
              sed -i 's/testCompile /testImplementation /g' "$f"
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f"
            fi
          done

      - name: Check Gradle wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --version --no-daemon --stacktrace 2>&1 | tee wrapper.log
          echo "=== Wrapper exit code: $? ==="
          echo "=== Wrapper log ==="
          cat wrapper.log

      - name: Check Gradle projects
        continue-on-error: true
        run: |
          cd android
          ./gradlew projects --no-daemon --stacktrace 2>&1 | tee projects.log
          echo "=== Exit code: $? ==="
          tail -30 projects.log

      - name: Build APK
        run: |
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          gradle_exit=${PIPESTATUS[0]}
          echo "=== Gradle exit code: $gradle_exit ==="
          grep -v -e "^\s*$" -e "Resource missing" -e "Downloading" build.log | tail -30 | while IFS= read -r line; do echo "::error::$line"; done
          exit $gradle_exit

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK
          path: android/app/build/outputs/apk/debug/*.apk
