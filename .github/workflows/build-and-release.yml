name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch libraries for Gradle compatibility
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f"
              sed -i 's/testCompile /testImplementation /g' "$f"
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f"
            fi
          done

      - name: Fix namespaces in library modules
        run: |
          for dir in node_modules/*/ node_modules/@*/*/; do
            manifest="$dir/android/src/main/AndroidManifest.xml"
            buildGradle="$dir/android/build.gradle"
            if [ -f "$manifest" ]; then
              package=$(grep -o 'package="[^"]*"' "$manifest" | head -1 | sed 's/package="//;s/"//')
              if [ -n "$package" ]; then
                if [ -f "$buildGradle" ] && ! grep -q "namespace " "$buildGradle"; then
                  echo "Adding namespace $package to $buildGradle"
                  sed -i "/android {/a\    namespace '$package'" "$buildGradle"
                fi
              fi
            fi
          done

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "EXIT: ${PIPESTATUS[0]}"
          exit ${PIPESTATUS[0]}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build.log

      - name: Analyze build output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the build log
            const logPath = path.join(process.env.GITHUB_WORKSPACE, 'android', 'build.log');
            if (!fs.existsSync(logPath)) {
              core.error('build.log not found!');
              return;
            }
            
            const log = fs.readFileSync(logPath, 'utf8');
            const lines = log.split('\n');
            
            // Find important lines
            const errors = lines.filter(l => 
              l.includes('ERROR') || 
              l.includes('FAILED') || 
              l.includes('What went wrong') ||
              l.includes('Could not find') ||
              l.includes('namespace not specified') ||
              l.includes('BUILD FAILED')
            );
            
            // Last 30 non-empty, non-noise lines
            const tail = lines.filter(l => 
              l.trim().length > 0 &&
              !l.includes('Resource missing') &&
              !l.includes('Downloading')
            ).slice(-30);
            
            core.summary.addHeading('Build Error Analysis');
            if (errors.length > 0) {
              core.summary.addHeading('Error Lines', 3);
              core.summary.addCodeBlock(errors.slice(0, 20).join('\n'), 'text');
            }
            core.summary.addHeading('Last 30 Significant Lines', 3);
            core.summary.addCodeBlock(tail.join('\n'), 'text');
            core.summary.addHeading('Task Lines', 3);
            core.summary.addCodeBlock(lines.filter(l => l.startsWith('>')).join('\n'), 'text');
            await core.summary.write();

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK
          path: android/app/build/outputs/apk/debug/*.apk
