name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch libraries for Gradle compatibility
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f"
              sed -i 's/testCompile /testImplementation /g' "$f"
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f"
            fi
          done

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK
          path: android/app/build/outputs/apk/debug/*.apk
