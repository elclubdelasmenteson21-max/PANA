name: Build PANA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch libraries for Gradle compatibility
        run: |
          for f in node_modules/*/android/build.gradle node_modules/@*/*/android/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/compile /implementation /g' "$f"
              sed -i 's/testCompile /testImplementation /g' "$f"
              sed -i 's/androidTestCompile /androidTestImplementation /g' "$f"
            fi
          done

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-7.6.1-bin.zip -o /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d "$HOME"
          echo "$HOME/gradle-7.6.1/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          cd android
          gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          gradle_exit=${PIPESTATUS[0]}
          echo "=== Error summary ==="
          grep -i "error\|FAILED\|Could not find\|could not resolve\|exception\|What went wrong" build.log | head -20 | while read line; do
            echo "::error::$line"
          done
          echo "=== APK output ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"
          exit $gradle_exit

      - name: Output full log tail
        if: failure()
        run: |
          echo "### Gradle Build Failure Log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 android/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Error lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -n -i "error\|FAILED\|What went wrong\|BUILD FAIL" android/build.log | tail -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PANA-APK
          path: android/app/build/outputs/apk/debug/*.apk
